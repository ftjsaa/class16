<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .remem{
            float: left;
        }
        .fgrtp{
            float: right;
        }
        </style>
</head>
<body>
<div class="login-box">

<h1>Sign In</h1>

<p>Enter your credential to continue</p>

<form>
    <input type="email" placeholder="Email">
    <input type="password" placeholder="password">

    <p>
        <span class="remem"><input type="checkbox"> <label>Remember me</label></span>
        <span class="fgrtp"><a href="#">Forgot Password</a></span>
    </p>
  <button>Sign In</button>
</form>
 <p>Don't have an accunt?</p><span><a href="#">Creat one</a></span></p>

</div>
</body>
</html>
